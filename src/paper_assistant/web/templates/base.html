<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Paper Assistant{% endblock %}</title>
    <script>
    (function() {
        const storageKey = 'paper-assistant-theme';
        const root = document.documentElement;
        const media = window.matchMedia('(prefers-color-scheme: dark)');

        function normalizeTheme(value) {
            return ['light', 'dark', 'system'].includes(value) ? value : 'light';
        }

        function resolveTheme(preference) {
            return preference === 'dark' || (preference === 'system' && media.matches) ? 'dark' : 'light';
        }

        let preference = 'light';
        try {
            preference = normalizeTheme(localStorage.getItem(storageKey));
        } catch (err) {
            preference = 'light';
        }

        root.dataset.theme = resolveTheme(preference);
        root.dataset.themePreference = preference;
    })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong><a href="/">Paper Assistant</a></strong></li>
        </ul>
        <ul>
            <li><a href="/">Papers</a></li>
            <li><a href="/feed.xml">RSS Feed</a></li>
            <li class="theme-switcher">
                <label for="theme-select" class="sr-only">Theme</label>
                <select id="theme-select" aria-label="Theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="system">System</option>
                </select>
            </li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>Paper Assistant v0.1.0 — AI-powered ML paper summarizer</small>
    </footer>

    <script>
    (function() {
        const storageKey = 'paper-assistant-theme';
        const root = document.documentElement;
        const select = document.getElementById('theme-select');
        const media = window.matchMedia('(prefers-color-scheme: dark)');

        function normalizeTheme(value) {
            return ['light', 'dark', 'system'].includes(value) ? value : 'light';
        }

        function resolveTheme(preference) {
            return preference === 'dark' || (preference === 'system' && media.matches) ? 'dark' : 'light';
        }

        function getPreference() {
            try {
                return normalizeTheme(localStorage.getItem(storageKey));
            } catch (err) {
                return normalizeTheme(root.dataset.themePreference);
            }
        }

        function setPreference(preference, persist) {
            const normalized = normalizeTheme(preference);
            root.dataset.theme = resolveTheme(normalized);
            root.dataset.themePreference = normalized;
            if (select) select.value = normalized;
            if (persist) {
                try {
                    localStorage.setItem(storageKey, normalized);
                } catch (err) {
                    // Theme choice is cosmetic; ignore private-mode storage failures.
                }
            }
        }

        setPreference(getPreference(), false);

        select?.addEventListener('change', function(event) {
            setPreference(event.target.value, true);
        });

        const syncSystemTheme = function() {
            if (getPreference() === 'system') setPreference('system', false);
        };

        if (media.addEventListener) {
            media.addEventListener('change', syncSystemTheme);
        } else if (media.addListener) {
            media.addListener(syncSystemTheme);
        }
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
